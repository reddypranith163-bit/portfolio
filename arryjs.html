<!DOCTYPE html>
<html>
    <body>
        <p id="demo"></p>
        <script>
          //creating an array using literal syntax
          let fruits=["Apple","Banana","Mango"];
          console.log(fruits);
          //creating an array using array constructor
          let numbers=new Array(10,20,30);
          console.log(numbers);
          //creating empty array and add elements later
          let students=[];
          students.push("Ravi");
          students.push("Sita");
          console.log(students);
          //displaying array in HTML document
          let colors=["red","green","blue"];
          document.getElementById("demo").innerHTML=colors;
        </script>
    </body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Simple Weather App</title>
</head>
<body>

<h2>Simple Weather App</h2>

<input type="text" id="city" placeholder="Enter city (e.g., London)">
<button onclick="getWeather()">Get Weather</button>

<p id="output"></p>
gz
<script>

async function getWeather() {

    let city = document.getElementById("city").value.trim(); 
    //trim() removes extra spaces from start and end of string. Its an inbuilt method for strings in JavaScript.

    if (city === "") {
        document.getElementById("output").innerHTML = "Please enter a city.";
        return;
    }

    document.getElementById("output").innerHTML = "Loading...";

    // We will wrap our code in try-catch to handle any errors that may occur during the fetch operations. 
    // Becuase API may fail, network may be down, city may not be found, etc. the program should not just stop working without any message to user.
    //Because of this risk of failure, we will wrap our code in try-catch block. 
    // If any error occurs, control will jump to catch block where we can show an error message to user instead of leaving them wondering why nothing is happening.
    
    try {

        // Step 1: Get latitude & longitude
        let geoResponse = await fetch(
            "https://geocoding-api.open-meteo.com/v1/search?name=" + city
        );
        //using geo coding api from open-meto.com which is a free API that allows us to convert city names into latitude and longitude coordinates.
        //We use fetch() to make a request to the API endpoint with the city name as a query parameter.
        //fetch() returns a promise that resolves to the response from the server. 
        // We use await to wait for the promise to resolve and give us the response object.

        if (!geoResponse.ok) {  
            throw new Error("Geocoding API failed");
        }  
        //The response from server contain (200, 404, 500, etc.) are called HTTP Status Codes. 
        // They are sent by the server to tell the browser whether the request was successful or failed.
        //ok is a boolean that is true if status is 200-299 (response successful). If response status code is 404 or 500, ok will be false.
        //In try catch wrap, throw block is used to create and throw an error and jump to catch block.
        // When we throw an error, it will immediately stop the execution of the try block and jump to the catch block.
        
        let geoData = await geoResponse.json();
        //json() is a method that reads the response body and parses it as JSON. 
        //server returns data in JSON format (which is a common format for APIs).
        //json() converts that JSON string into a JavaScript object that we can work with in our code.
        // It also returns a promise, so we use await to wait for it to finish and give us the parsed data.

        if (!geoData.results || geoData.results.length === 0) {
            throw new Error("City not found");
        }
        //The json file from api contains a field called results which is an array of matching locations.
        //If there are no matches, results will be empty or undefined.

        let lat = geoData.results[0].latitude;
        let lon = geoData.results[0].longitude;
        //the json file from api contains an array called results which has objects with latitude and longitude of the city. 
        //We take the first result (results[0]) assuming it's the best match.
        // 🌦 Step 2: Get weather
        let weatherResponse = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=" +
            lat + "&longitude=" + lon + "&current_weather=true"
        );
        //longitude and latitude data we got from previous API is used to make another API call to get the weather data for that location.
        //We use fetch() again to make a request to the weather API endpoint with the latitude and longitude as query parameters, 
        // along with current_weather=true to specify that we want the current weather data.
        //this link is taken from open-meteo.com documentation for their weather API.

         if (!weatherResponse.ok) {
            throw new Error("Weather API failed");
        }

        let weatherData = await weatherResponse.json();

        if (!weatherData.current_weather) {
            throw new Error("Weather data not available");
        }
//current_weather is a field in the JSON response that contains the current weather data.
//If for some reason the API does not return current weather data, we throw an error.

        let temperature = weatherData.current_weather.temperature;
        //temperature is a field inside current_weather that gives us the current temperature in Celsius.

        document.getElementById("output").innerHTML =
            "Current Temperature in " + city + " is " + temperature + "°C";

    } catch (error) {

        document.getElementById("output").innerHTML =
            "Error: " + error.message + " X";

        console.error(error); // For debugging
    }
}

</script>

</body>
</html>

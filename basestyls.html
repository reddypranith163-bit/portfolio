 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Responsive Design with Media Queries</title>
</head>
<style>
        /* Base Styles (Mobile-first) */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column; /* vertical menu for mobile */
            text-align: center;
        }

        nav a {
            color: white;
            padding: 15px;
            text-decoration: none;
            border-bottom: 1px solid #34495e;
        }

        main {
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column; /* stacked for mobile */
            gap: 20px;
        }

        .box {
            background-color: #e67e22;
            color: white;
            padding: 50px;
            text-align: center;
            font-size: 1.2rem;
        }
        body::before{
            content:"Mobile view(<768px)";
            display:block;
            background-color:#c0392b;
            color:white;
            text-align:center;
            font-weight: bold;
            padding:5px 0;
        }
        /* Media Query:Tablet*/
        @media(min-width:768px){/Breakpoint/
            nav{
                flex-direction: row;/horizontal menu/
                justify-content:center
            }
            nav a:last-child{
                border-bottom:none;
                border-right: 1px solid #34495e;
            }
            nav a:last-child{
                border-right:none;
            }
            .container{
                flex-direction: row;
            }
            body::before{
                content:"Tablet View(768px-1023px)";
            }
        }
        /Media Query :Desktop/
        @media(min-width:1024px){
            .box{
                font-size:1.5rem;
                padding:80px;
            }
            body::before{
                content:"Desktop View(1024px+)";
            }
        }
</style>
<body>
    <header>
        <h1>Responsive Design Example</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <div class="container">
            <div class="box">Box 1</div>
            <div class="box">Box 2</div>
            <div class="box">Box 3</div>
        </div>
    </main>
</body>
</html>

<style>
        /* Base Styles (Mobile-first) */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column; /* vertical menu for mobile */
            text-align: center;
        }

        nav a {
            color: white;
            padding: 15px;
            text-decoration: none;
            border-bottom: 1px solid #34495e;
        }

        main {
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column; /* stacked for mobile */
            gap: 20px;
        }

        .box {
            background-color: #e67e22;
            color: white;
            padding: 50px;
            text-align: center;
            font-size: 1.2rem;
        }

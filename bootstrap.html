<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-3">
    <div class="row">
        <div class="col bg-primary text-white">Column 1. sdnfkdsfksdacsxvm mc mv cm vmcm vfkvkfdmvkfdmkvmgfk</div>
        <div class="col bg-success text-white">Column 2</div>
        <div class="col bg-warning text-dark">Column 3</div>
    </div>
</div>

<br>

<br>

<div class="mx-auto" style="width: 200px;">
  Centered element
</div>

<br>

<div class="mx-auto" style="width: 400px;">
    <button type="button" class="btn btn-primary btn-lg">Large button</button>
</div>

<br>

<div class="mx-auto" style="width: fit-content; display:flex;">
<form>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Check me out</label>
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>

</body>
</html>
